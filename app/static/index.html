<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ECG DICOM Converter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 1.5rem; }

    form {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 1.5rem;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    label { font-size: 0.85rem; font-weight: 500; color: #555; display: block; margin-bottom: 0.3rem; }

    input[type="number"],
    input[type="file"],
    select {
      width: 100%;
      padding: 0.45rem 0.6rem;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 0.9rem;
      background: #fafafa;
    }

    .row { display: flex; gap: 1rem; }
    .row > div { flex: 1; }

    .checks { display: flex; gap: 1.5rem; }
    .checks label { display: flex; align-items: center; gap: 0.4rem; font-weight: 400; color: #333; cursor: pointer; }
    .checks input[type="checkbox"] { width: 15px; height: 15px; cursor: pointer; }

    button[type="submit"] {
      padding: 0.6rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
    }
    button[type="submit"]:disabled { background: #93c5fd; cursor: default; }
    button[type="submit"]:hover:not(:disabled) { background: #1d4ed8; }

    #result {
      margin-top: 1.5rem;
      width: 100%;
      max-width: 960px;
      display: none;
    }

    #result img {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
    }

    #download-link {
      display: inline-block;
      margin-top: 0.5rem;
      font-size: 0.85rem;
      color: #2563eb;
      text-decoration: none;
    }
    #download-link:hover { text-decoration: underline; }

    #error {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 6px;
      color: #b91c1c;
      font-size: 0.875rem;
      display: none;
      max-width: 480px;
      width: 100%;
    }
  </style>
</head>
<body>

<h1>ECG DICOM Converter</h1>

<form id="ecg-form">
  <div>
    <label for="file">DICOM file</label>
    <input type="file" id="file" accept=".dcm" required>
  </div>

  <div class="row">
    <div>
      <label for="layout">Layout</label>
      <select id="layout">
        <option value="3x4_1">3x4_1 (default)</option>
        <option value="3x4">3x4</option>
        <option value="6x2">6x2</option>
        <option value="12x1">12x1</option>
      </select>
    </div>
    <div>
      <label for="paper">Paper</label>
      <select id="paper">
        <option value="a4">A4 (default)</option>
        <option value="letter">Letter</option>
      </select>
    </div>
  </div>

  <div class="row">
    <div>
      <label for="format">Output format</label>
      <select id="format">
        <option value="png">PNG (default)</option>
        <option value="pdf">PDF</option>
        <option value="svg">SVG</option>
        <option value="tiff">TIFF</option>
        <option value="jpg">JPEG</option>
        <option value="eps">EPS</option>
      </select>
    </div>
    <div>
      <label for="mm-mv">mm/mV</label>
      <input type="number" id="mm-mv" value="10" min="1" max="50" step="0.5">
    </div>
  </div>

  <div class="checks">
    <label><input type="checkbox" id="minor-grid"> Minor grid</label>
    <label><input type="checkbox" id="interpretation"> Interpretation</label>
  </div>

  <button type="submit">Convert</button>
</form>

<div id="error"></div>

<div id="result">
  <img id="result-img" alt="ECG output" style="display:none">
  <a id="download-link" download>Download</a>
</div>

<script>
  const INLINE_FORMATS = new Set(['png', 'jpg', 'jpeg', 'svg']);

  document.getElementById('ecg-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const btn = e.target.querySelector('button[type="submit"]');
    const errorEl = document.getElementById('error');
    const resultEl = document.getElementById('result');
    const imgEl = document.getElementById('result-img');
    const linkEl = document.getElementById('download-link');

    errorEl.style.display = 'none';
    resultEl.style.display = 'none';
    imgEl.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Converting…';

    const file = document.getElementById('file').files[0];
    const format = document.getElementById('format').value;

    const body = new FormData();
    body.append('file', file);
    body.append('layout', document.getElementById('layout').value);
    body.append('paper', document.getElementById('paper').value);
    body.append('format', format);
    body.append('minor_grid', document.getElementById('minor-grid').checked);
    body.append('interpretation', document.getElementById('interpretation').checked);
    body.append('mm_mv', document.getElementById('mm-mv').value);

    try {
      const res = await fetch('/ui/convert', { method: 'POST', body });

      if (!res.ok) {
        const data = await res.json().catch(() => ({ detail: res.statusText }));
        throw new Error(data.detail ?? res.statusText);
      }

      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const filename = `ecg.${format}`;

      linkEl.href = url;
      linkEl.download = filename;
      linkEl.textContent = `Download ${filename}`;

      if (INLINE_FORMATS.has(format)) {
        imgEl.src = url;
        imgEl.style.display = 'block';
      }

      resultEl.style.display = 'block';
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Convert';
    }
  });
</script>

</body>
</html>
