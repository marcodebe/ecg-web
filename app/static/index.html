<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ECG DICOM Converter</title>
  <meta name="description" content="Web service for converting ECG DICOM files to graphic images. Supports multiple layouts, paper formats and output formats (PNG, PDF, SVG, TIFF and more).">
  <meta name="author" content="Marco De Benedetto <debe@galliera.it>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      background: #0f172a;
      color: #f8fafc;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .header-title h1 {
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .header-title p {
      font-size: 0.75rem;
      color: #94a3b8;
      margin-top: 0.15rem;
    }

    .gh-badges {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .gh-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 0.75rem;
      border: 1px solid #334155;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #cbd5e1;
      text-decoration: none;
      background: #1e293b;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }

    .gh-badge:hover {
      background: #f8fafc;
      border-color: #f8fafc;
      color: #0f172a;
    }

    .gh-badge svg { flex-shrink: 0; }

    .gh-badge .badge-label {
      color: #64748b;
      font-weight: 400;
      font-size: 0.72rem;
      margin-right: 0.15rem;
    }

    /* ── Main layout ─────────────────────────────────────── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      gap: 1.5rem;
    }

    /* ── Form card ───────────────────────────────────────── */
    form {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      padding: 0;
      width: 100%;
      max-width: 500px;
      overflow: hidden;
    }

    .form-section {
      padding: 1.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }

    .form-section + .form-section {
      border-top: 1px solid #f1f5f9;
    }

    .section-title {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
      margin-bottom: 0.1rem;
    }

    label {
      font-size: 0.82rem;
      font-weight: 500;
      color: #475569;
      display: block;
      margin-bottom: 0.3rem;
    }

    input[type="number"],
    input[type="file"],
    select {
      width: 100%;
      padding: 0.5rem 0.65rem;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 0.875rem;
      background: #f8fafc;
      color: #1e293b;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input[type="number"]:focus,
    input[type="file"]:focus,
    select:focus {
      outline: none;
      border-color: #0369a1;
      box-shadow: 0 0 0 3px rgba(3,105,161,.12);
      background: #fff;
    }

    .row { display: flex; gap: 0.75rem; }
    .row > div { flex: 1; min-width: 0; }

    /* Source toggle */
    .source-tabs {
      display: flex;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      overflow: hidden;
      font-size: 0.82rem;
    }

    .source-tabs input[type="radio"] { display: none; }

    .source-tabs label {
      flex: 1;
      text-align: center;
      padding: 0.45rem;
      cursor: pointer;
      color: #64748b;
      margin: 0;
      background: #f8fafc;
      transition: background 0.15s, color 0.15s;
      font-weight: 500;
    }

    .source-tabs input[type="radio"]:checked + label {
      background: #0369a1;
      color: #fff;
    }

    /* Checkboxes */
    .checks {
      display: flex;
      gap: 1.5rem;
    }

    .checks label {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-weight: 400;
      color: #334155;
      cursor: pointer;
      margin: 0;
    }

    .checks input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: #0369a1;
      cursor: pointer;
    }

    /* Submit */
    .disclaimer {
      font-size: 0.72rem;
      color: #94a3b8;
      margin-top: 0.4rem;
    }

    .form-footer {
      padding: 1rem 1.5rem;
      background: #f8fafc;
      border-top: 1px solid #e2e8f0;
    }

    button[type="submit"] {
      width: 100%;
      padding: 0.65rem;
      background: #0369a1;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: background 0.15s;
    }

    button[type="submit"]:hover:not(:disabled) { background: #0284c7; }
    button[type="submit"]:disabled { background: #7dd3fc; cursor: default; }

    /* ── Error ───────────────────────────────────────────── */
    #error {
      padding: 0.75rem 1rem;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      color: #b91c1c;
      font-size: 0.875rem;
      display: none;
      width: 100%;
      max-width: 500px;
    }

    /* ── Result ──────────────────────────────────────────── */
    #result {
      width: 100%;
      max-width: 960px;
      display: none;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      overflow: hidden;
    }

    #result-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.65rem 1rem;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      font-size: 0.8rem;
      color: #64748b;
    }

    #download-link {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.3rem 0.75rem;
      background: #0369a1;
      color: #fff;
      border-radius: 5px;
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 500;
      transition: background 0.15s;
    }

    #download-link:hover { background: #0284c7; }

    #result img {
      width: 100%;
      display: block;
      background: #fff;
    }

    /* ── Footer ──────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 1.25rem;
      font-size: 0.75rem;
      color: #94a3b8;
      border-top: 1px solid #e2e8f0;
      background: #fff;
    }
  </style>
</head>
<body>

<header>
  <div class="header-title">
    <h1>ECG DICOM Converter</h1>
    <p>Convert DICOM ECG waveforms to PNG, PDF, SVG and more</p>
  </div>
  <div class="gh-badges">
    <a class="gh-badge" href="https://github.com/marcodebe/ecg-web" target="_blank" rel="noopener">

    </a>
  </div>
</header>

<main>

  <form id="ecg-form">

    <div class="form-section">
      <div class="section-title">Source</div>
      <div class="source-tabs">
        <input type="radio" name="source" id="src-upload" value="upload" checked>
        <label for="src-upload">Upload file</label>
        <input type="radio" name="source" id="src-sample" value="sample">
        <label for="src-sample">Sample file</label>
      </div>
      <div id="upload-section">
        <label for="file">DICOM file</label>
        <input type="file" id="file" accept=".dcm">
        <p class="disclaimer">Uploaded files are processed in memory only and are never stored on the server.</p>
      </div>
      <div id="sample-section" style="display:none">
        <label for="sample">Sample file</label>
        <select id="sample" disabled>
          <option value="">Loading…</option>
        </select>
      </div>
    </div>

    <div class="form-section">
      <div class="section-title">Layout</div>
      <div class="row">
        <div>
          <label for="layout">Layout</label>
          <select id="layout">
            <option value="3x4_1">3×4+1</option>
            <option value="3x4">3×4</option>
            <option value="6x2">6×2</option>
            <option value="12x1">12×1</option>
          </select>
        </div>
        <div>
          <label for="paper">Paper</label>
          <select id="paper">
            <option value="a4">A4</option>
            <option value="letter">Letter</option>
          </select>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="section-title">Output</div>
      <div class="row">
        <div>
          <label for="format">Format</label>
          <select id="format">
            <option value="png">PNG</option>
            <option value="pdf">PDF</option>
            <option value="svg" selected>SVG</option>
            <option value="tiff">TIFF</option>
            <option value="jpg">JPEG</option>
            <option value="eps">EPS</option>
          </select>
        </div>
        <div>
          <label for="mm-mv">Amplitude (mm/mV)</label>
          <input type="number" id="mm-mv" value="10" min="1" max="50" step="0.5">
        </div>
      </div>
      <div class="checks">
        <label><input type="checkbox" id="minor-grid"> Minor grid</label>
        <label><input type="checkbox" id="interpretation"> Interpretation</label>
      </div>
    </div>

    <div class="form-footer">
      <button type="submit">Convert</button>
    </div>

  </form>

  <div id="error"></div>

  <div id="result">
    <div id="result-toolbar">
      <span>Result</span>
      <a id="download-link" download>
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Download
      </a>
    </div>
    <img id="result-img" alt="ECG output" style="display:none">
  </div>

</main>

<footer>
  Marco De Benedetto &mdash; E.O. Ospedali Galliera, Genova
</footer>

<script>
  const INLINE_FORMATS = new Set(['png', 'jpg', 'jpeg', 'svg']);

  fetch('/ui/samples')
    .then(r => r.json())
    .then(samples => {
      const sel = document.getElementById('sample');
      if (samples.length === 0) {
        sel.innerHTML = '<option value="">No sample files available</option>';
        return;
      }
      sel.innerHTML = samples.map(s => `<option value="${s}">${s}</option>`).join('');
      sel.disabled = false;
    })
    .catch(() => {
      document.getElementById('sample').innerHTML = '<option value="">Unavailable</option>';
    });

  document.querySelectorAll('input[name="source"]').forEach(radio => {
    radio.addEventListener('change', () => {
      const isSample = radio.value === 'sample';
      document.getElementById('upload-section').style.display = isSample ? 'none' : 'block';
      document.getElementById('sample-section').style.display = isSample ? 'block' : 'none';
      document.getElementById('file').required = !isSample;
    });
  });

  document.getElementById('ecg-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const btn = e.target.querySelector('button[type="submit"]');
    const errorEl = document.getElementById('error');
    const resultEl = document.getElementById('result');
    const imgEl = document.getElementById('result-img');
    const linkEl = document.getElementById('download-link');

    errorEl.style.display = 'none';
    resultEl.style.display = 'none';
    imgEl.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Converting…';

    const format = document.getElementById('format').value;
    const useSample = document.querySelector('input[name="source"]:checked').value === 'sample';

    const body = new FormData();
    body.append('layout', document.getElementById('layout').value);
    body.append('paper', document.getElementById('paper').value);
    body.append('format', format);
    body.append('minor_grid', document.getElementById('minor-grid').checked);
    body.append('interpretation', document.getElementById('interpretation').checked);
    body.append('mm_mv', document.getElementById('mm-mv').value);

    let endpoint;
    if (useSample) {
      endpoint = '/ui/convert-sample';
      body.append('filename', document.getElementById('sample').value);
    } else {
      const fileInput = document.getElementById('file');
      if (!fileInput.files.length) {
        errorEl.textContent = 'Please select a DICOM file.';
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Convert';
        return;
      }
      endpoint = '/ui/convert';
      body.append('file', fileInput.files[0]);
    }

    try {
      const res = await fetch(endpoint, { method: 'POST', body });

      if (!res.ok) {
        const data = await res.json().catch(() => ({ detail: res.statusText }));
        throw new Error(data.detail ?? res.statusText);
      }

      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const filename = `ecg.${format}`;

      linkEl.href = url;
      linkEl.download = filename;
      linkEl.querySelector('svg').nextSibling
        ? linkEl.lastChild.textContent = ` ${filename}`
        : linkEl.append(` ${filename}`);

      if (INLINE_FORMATS.has(format)) {
        imgEl.src = url;
        imgEl.style.display = 'block';
      }

      resultEl.style.display = 'block';
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Convert';
    }
  });
</script>

</body>
</html>
