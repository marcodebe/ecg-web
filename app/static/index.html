<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ECG DICOM Converter</title>
  <meta name="description" content="Web service for converting ECG DICOM files to graphic images. Supports multiple layouts, paper formats and output formats (PNG, PDF, SVG, TIFF and more).">
  <meta name="author" content="Marco De Benedetto <debe@galliera.it>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 1.5rem; }

    form {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 1.5rem;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    label { font-size: 0.85rem; font-weight: 500; color: #555; display: block; margin-bottom: 0.3rem; }

    input[type="number"],
    input[type="file"],
    select {
      width: 100%;
      padding: 0.45rem 0.6rem;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 0.9rem;
      background: #fafafa;
    }

    .row { display: flex; gap: 1rem; }
    .row > div { flex: 1; }

    .checks { display: flex; gap: 1.5rem; }
    .checks label { display: flex; align-items: center; gap: 0.4rem; font-weight: 400; color: #333; cursor: pointer; }
    .checks input[type="checkbox"] { width: 15px; height: 15px; cursor: pointer; }

    /* Source toggle */
    .source-tabs {
      display: flex;
      border: 1px solid #ccc;
      border-radius: 5px;
      overflow: hidden;
      font-size: 0.85rem;
    }
    .source-tabs label {
      flex: 1;
      text-align: center;
      padding: 0.4rem;
      cursor: pointer;
      color: #555;
      margin: 0;
      background: #fafafa;
      border: none;
      transition: background 0.15s;
    }
    .source-tabs input[type="radio"] { display: none; }
    .source-tabs input[type="radio"]:checked + label {
      background: #2563eb;
      color: #fff;
      font-weight: 600;
    }

    #sample-section select:disabled { color: #aaa; }

    button[type="submit"] {
      padding: 0.6rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
    }
    button[type="submit"]:disabled { background: #93c5fd; cursor: default; }
    button[type="submit"]:hover:not(:disabled) { background: #1d4ed8; }

    #result {
      margin-top: 1.5rem;
      width: 100%;
      max-width: 960px;
      display: none;
    }

    #result img {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
    }

    #download-link {
      display: inline-block;
      margin-top: 0.5rem;
      font-size: 0.85rem;
      color: #2563eb;
      text-decoration: none;
    }
    #download-link:hover { text-decoration: underline; }

    #error {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 6px;
      color: #b91c1c;
      font-size: 0.875rem;
      display: none;
      max-width: 480px;
      width: 100%;
    }

    footer {
      margin-top: 2.5rem;
      font-size: 0.8rem;
      color: #888;
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    footer a {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      color: #555;
      text-decoration: none;
    }

    footer a:hover { color: #111; }

    footer svg { display: block; }
  </style>
</head>
<body>

<h1>ECG DICOM Converter</h1>

<form id="ecg-form">

  <!-- Selezione sorgente -->
  <div>
    <label>Source</label>
    <div class="source-tabs">
      <input type="radio" name="source" id="src-upload" value="upload" checked>
      <label for="src-upload">Upload file</label>
      <input type="radio" name="source" id="src-sample" value="sample">
      <label for="src-sample">Sample file</label>
    </div>
  </div>

  <div id="upload-section">
    <label for="file">DICOM file</label>
    <input type="file" id="file" accept=".dcm">
  </div>

  <div id="sample-section" style="display:none">
    <label for="sample">Sample file</label>
    <select id="sample" disabled>
      <option value="">Loading…</option>
    </select>
  </div>

  <div class="row">
    <div>
      <label for="layout">Layout</label>
      <select id="layout">
        <option value="3x4_1">3x4_1 (default)</option>
        <option value="3x4">3x4</option>
        <option value="6x2">6x2</option>
        <option value="12x1">12x1</option>
      </select>
    </div>
    <div>
      <label for="paper">Paper</label>
      <select id="paper">
        <option value="a4">A4 (default)</option>
        <option value="letter">Letter</option>
      </select>
    </div>
  </div>

  <div class="row">
    <div>
      <label for="format">Output format</label>
      <select id="format">
        <option value="png">PNG (default)</option>
        <option value="pdf">PDF</option>
        <option value="svg">SVG</option>
        <option value="tiff">TIFF</option>
        <option value="jpg">JPEG</option>
        <option value="eps">EPS</option>
      </select>
    </div>
    <div>
      <label for="mm-mv">mm/mV</label>
      <input type="number" id="mm-mv" value="10" min="1" max="50" step="0.5">
    </div>
  </div>

  <div class="checks">
    <label><input type="checkbox" id="minor-grid"> Minor grid</label>
    <label><input type="checkbox" id="interpretation"> Interpretation</label>
  </div>

  <button type="submit">Convert</button>
</form>

<div id="error"></div>

<div id="result">
  <img id="result-img" alt="ECG output" style="display:none">
  <a id="download-link" download>Download</a>
</div>

<footer>

<script>
  const INLINE_FORMATS = new Set(['png', 'jpg', 'jpeg', 'svg']);

  // Carica lista file campione all'avvio
  fetch('/ui/samples')
    .then(r => r.json())
    .then(samples => {
      const sel = document.getElementById('sample');
      if (samples.length === 0) {
        sel.innerHTML = '<option value="">No sample files available</option>';
        return;
      }
      sel.innerHTML = samples.map(s => `<option value="${s}">${s}</option>`).join('');
      sel.disabled = false;
    })
    .catch(() => {
      document.getElementById('sample').innerHTML = '<option value="">Unavailable</option>';
    });

  // Toggle upload / sample
  document.querySelectorAll('input[name="source"]').forEach(radio => {
    radio.addEventListener('change', () => {
      const isSample = radio.value === 'sample';
      document.getElementById('upload-section').style.display = isSample ? 'none' : 'block';
      document.getElementById('sample-section').style.display = isSample ? 'block' : 'none';
      document.getElementById('file').required = !isSample;
    });
  });

  document.getElementById('ecg-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const btn = e.target.querySelector('button[type="submit"]');
    const errorEl = document.getElementById('error');
    const resultEl = document.getElementById('result');
    const imgEl = document.getElementById('result-img');
    const linkEl = document.getElementById('download-link');

    errorEl.style.display = 'none';
    resultEl.style.display = 'none';
    imgEl.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Converting…';

    const format = document.getElementById('format').value;
    const useSample = document.querySelector('input[name="source"]:checked').value === 'sample';

    const body = new FormData();
    body.append('layout', document.getElementById('layout').value);
    body.append('paper', document.getElementById('paper').value);
    body.append('format', format);
    body.append('minor_grid', document.getElementById('minor-grid').checked);
    body.append('interpretation', document.getElementById('interpretation').checked);
    body.append('mm_mv', document.getElementById('mm-mv').value);

    let endpoint;
    if (useSample) {
      endpoint = '/ui/convert-sample';
      body.append('filename', document.getElementById('sample').value);
    } else {
      endpoint = '/ui/convert';
      body.append('file', document.getElementById('file').files[0]);
    }

    try {
      const res = await fetch(endpoint, { method: 'POST', body });

      if (!res.ok) {
        const data = await res.json().catch(() => ({ detail: res.statusText }));
        throw new Error(data.detail ?? res.statusText);
      }

      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const filename = `ecg.${format}`;

      linkEl.href = url;
      linkEl.download = filename;
      linkEl.textContent = `Download ${filename}`;

      if (INLINE_FORMATS.has(format)) {
        imgEl.src = url;
        imgEl.style.display = 'block';
      }

      resultEl.style.display = 'block';
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Convert';
    }
  });
</script>

</body>
</html>
