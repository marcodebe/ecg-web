# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name ecg.galliera.it;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name ecg.galliera.it;

    # Certificati Let's Encrypt (emetti con: certbot --nginx -d ecg.galliera.it)
    ssl_certificate     /etc/letsencrypt/live/ecg.galliera.it/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ecg.galliera.it/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Dimensione massima upload (file DICOM ECG sono tipicamente < 1 MB)
    client_max_body_size 10M;

    # Header di sicurezza
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         SAMEORIGIN;
    add_header Referrer-Policy         strict-origin-when-cross-origin;

    # Compressione per risposte testuali (JSON, SVG)
    gzip on;
    gzip_types application/json image/svg+xml text/plain;

    location / {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout generosi per la conversione ECG (rendering matplotlib)
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
